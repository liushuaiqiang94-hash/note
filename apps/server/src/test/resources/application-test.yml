spring:
  datasource:
    url: jdbc:h2:mem:task_list_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  task:
    scheduling:
      enabled: false

app:
  jwt:
    issuer: task-list-server-test
    secret: test-secret-key-should-be-at-least-32
    access-token-expire-seconds: 7200
  wechat:
    app-id: test-appid
    app-secret: test-secret
    code2-session-url: https://api.weixin.qq.com/sns/jscode2session
